  <path d="M712,878 L712,816 Q708,795 555,793 L500,793 L500,878Z"
        fill="#fafafa" stroke="#1565c0" stroke-width="4" stroke-linejoin="round"/>
  <rect x="496" y="793" width="8" height="85" fill="#0d47a1"/>
  <line x1="308" y1="822" x2="490" y2="822" stroke="#bbdefb" stroke-width="2"/>
  <line x1="308" y1="838" x2="490" y2="838" stroke="#bbdefb" stroke-width="2"/>
  <line x1="308" y1="854" x2="490" y2="854" stroke="#bbdefb" stroke-width="2"/>
  <line x1="308" y1="870" x2="490" y2="870" stroke="#bbdefb" stroke-width="2"/>
  <line x1="510" y1="822" x2="692" y2="822" stroke="#bbdefb" stroke-width="2"/>
  <line x1="510" y1="838" x2="692" y2="838" stroke="#bbdefb" stroke-width="2"/>
  <line x1="510" y1="854" x2="692" y2="854" stroke="#bbdefb" stroke-width="2"/>
  <line x1="510" y1="870" x2="692" y2="870" stroke="#bbdefb" stroke-width="2"/>

  <!-- Pencil cup right -->
  <rect x="754" y="680" width="14" height="78" rx="4" fill="#1565c0"/>
  <polygon points="754,680 768,680 761,655" fill="#fffde7"/>
  <rect x="781" y="686" width="14" height="72" rx="4" fill="#b71c1c"/>
  <polygon points="781,686 795,686 788,661" fill="#fffde7"/>
  <rect x="808" y="674" width="14" height="84" rx="4" fill="#1b5e20"/>
  <polygon points="808,674 822,674 815,649" fill="#fffde7"/>
  <rect x="746" y="753" width="90" height="80" rx="10" fill="#1976d2"/>
  <rect x="746" y="753" width="90" height="18" rx="8" fill="#42a5f5"/>

  <!-- Plant far right -->
  <path d="M870,826 L884,768 L950,768 L964,826Z" fill="#c62828"/>
  <rect x="866" y="818" width="105" height="18" rx="5" fill="#b71c1c"/>
  <rect x="884" y="768" width="66" height="12" rx="4" fill="#4e342e"/>
  <line x1="917" y1="780" x2="917" y2="742" stroke="#388e3c" stroke-width="7"/>
  <ellipse cx="917" cy="722" rx="28" ry="52" fill="#2e7d32"
           transform="rotate(-22 917 722)"/>
  <ellipse cx="917" cy="718" rx="26" ry="48" fill="#43a047"
           transform="rotate(18 917 718)"/>
  <ellipse cx="910" cy="710" rx="22" ry="42" fill="#388e3c"
           transform="rotate(-48 910 710)"/>

  <!-- ── GIRL ── -->

  <!-- Pigtails behind head -->
  <ellipse cx="354" cy="580" rx="34" ry="65" fill="#5d3a1a"
           transform="rotate(-16 354 580)"/>
  <ellipse cx="646" cy="580" rx="34" ry="65" fill="#5d3a1a"
           transform="rotate(16 646 580)"/>

  <!-- Neck -->
  <rect x="470" y="592" width="60" height="52" rx="12" fill="#f5c17a"/>

  <!-- Body / yellow shirt -->
  <path d="M325,632 Q325,620 352,614 L435,600 Q500,594 565,600 L648,614
