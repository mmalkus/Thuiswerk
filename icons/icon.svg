  <path d="M378,610 Q500,600 622,610"
        fill="none" stroke="#fbc02d" stroke-width="8"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Left arm -->
  <path d="M335,665 Q282,705 260,758 Q248,782 270,788
           Q290,796 312,766 Q336,730 380,700"
        fill="none" stroke="#f5c17a" stroke-width="52" stroke-linecap="round"/>

  <!-- Right arm -->
  <path d="M665,665 Q718,705 740,758 Q752,782 730,788
           Q710,796 688,766 Q664,730 620,700"
        fill="none" stroke="#f5c17a" stroke-width="52" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="500" cy="490" rx="138" ry="128" fill="#f5c17a"/>

  <!-- Hair top block -->
  <path d="M366,485 Q362,362 500,340 Q638,362 634,485
           Q630,438 500,426 Q370,438 366,485Z"
        fill="#5d3a1a"/>
  <!-- Hair left side -->
  <path d="M366,485 Q354,518 360,552 Q370,574 384,558 Q392,532 384,500Z"
        fill="#5d3a1a"/>
  <!-- Hair right side -->
  <path d="M634,485 Q646,518 640,552 Q630,574 616,558 Q608,532 616,500Z"
        fill="#5d3a1a"/>

  <!-- Ears -->
  <ellipse cx="365" cy="500" rx="22" ry="26" fill="#f5c17a"/>
  <ellipse cx="635" cy="500" rx="22" ry="26" fill="#f5c17a"/>

  <!-- Left eye -->
  <ellipse cx="452" cy="490" rx="24" ry="26" fill="white"/>
  <circle cx="452" cy="494" r="16" fill="#111"/>
  <circle cx="446" cy="487" r="6" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="548" cy="490" rx="24" ry="26" fill="white"/>
  <circle cx="548" cy="494" r="16" fill="#111"/>
  <circle cx="542" cy="487" r="6" fill="white"/>

  <!-- Eyebrows -->
  <path d="M432,466 Q452,456 472,466"
        fill="none" stroke="#3e2008" stroke-width="8" stroke-linecap="round"/>
  <path d="M528,466 Q548,456 568,466"
        fill="none" stroke="#3e2008" stroke-width="8" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="500" cy="516" r="6" fill="#e8a070" opacity="0.6"/>

  <!-- Smile -->
  <path d="M464,540 Q500,565 536,540"
        fill="none" stroke="#c07048" stroke-width="9" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="415" cy="524" rx="38" ry="26" fill="#f48fb1" opacity="0.45"/>
  <ellipse cx="585" cy="524" rx="38" ry="26" fill="#f48fb1" opacity="0.45"/>

  <!-- Pencil in left hand -->
  <line x1="288" y1="782" x2="390" y2="730"
        stroke="#1565c0" stroke-width="14" stroke-linecap="round"/>
  <polygon points="390,730 398,716 384,720" fill="#fffde7"/>

</svg>
