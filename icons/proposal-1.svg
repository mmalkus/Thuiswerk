<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>

  <!-- Book base (open book) -->
  <rect x="80" y="290" width="352" height="160" rx="12" fill="#2a2a4e"/>
  <!-- Left page -->
  <path d="M80 295 Q256 270 256 295 L256 445 Q256 450 250 450 L86 450 Q80 450 80 444 Z" fill="#e8e0d0"/>
  <!-- Right page -->
  <path d="M432 295 Q256 270 256 295 L256 445 Q256 450 262 450 L426 450 Q432 450 432 444 Z" fill="#f5f0e8"/>
  <!-- Book spine -->
  <rect x="250" y="270" width="12" height="185" rx="4" fill="#8a7a6a"/>
  <!-- Page lines left -->
  <line x1="110" y1="330" x2="230" y2="325" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>
  <line x1="110" y1="355" x2="230" y2="352" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>
  <line x1="110" y1="380" x2="230" y2="379" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>
  <!-- Page lines right -->
  <line x1="282" y1="325" x2="402" y2="330" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>
  <line x1="282" y1="352" x2="402" y2="355" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>
  <line x1="282" y1="379" x2="402" y2="380" stroke="#c0b0a0" stroke-width="6" stroke-linecap="round"/>

  <!-- House on top of book -->
  <!-- Roof -->
  <polygon points="256,80 140,230 372,230" fill="#e8ff47"/>
  <!-- Roof outline -->
  <polygon points="256,80 140,230 372,230" fill="none" stroke="#1a1a2e" stroke-width="6"/>
  <!-- Chimney -->
  <rect x="298" y="100" width="32" height="60" rx="4" fill="#c8df20"/>
  <!-- House body -->
  <rect x="160" y="225" width="192" height="120" rx="6" fill="#3a7bd5"/>
  <!-- Door -->
  <rect x="225" y="285" width="62" height="60" rx="6" fill="#1a1a2e"/>
  <!-- Door knob -->
  <circle cx="279" cy="318" r="5" fill="#e8ff47"/>
  <!-- Window left -->
  <rect x="172" y="242" width="48" height="42" rx="4" fill="#a0d0ff"/>
  <line x1="196" y1="242" x2="196" y2="284" stroke="#1a1a2e" stroke-width="3"/>
  <line x1="172" y1="263" x2="220" y2="263" stroke="#1a1a2e" stroke-width="3"/>
  <!-- Window right -->
  <rect x="292" y="242" width="48" height="42" rx="4" fill="#a0d0ff"/>
  <line x1="316" y1="242" x2="316" y2="284" stroke="#1a1a2e" stroke-width="3"/>
  <line x1="292" y1="263" x2="340" y2="263" stroke="#1a1a2e" stroke-width="3"/>
</svg>
