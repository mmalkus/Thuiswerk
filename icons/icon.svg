<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">

  <!-- Background -->
  <rect width="1000" height="1000" rx="210" ry="210" fill="#faf8f3"/>

  <!-- House outline -->
  <polyline
    points="118,285 118,820 500,58 882,285 882,820"
    fill="none" stroke="#1a3564" stroke-width="30"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small blue heart above the S -->
  <path d="M500,162 C500,162 508,149 520,149 C532,149 540,159 540,169
           C540,182 522,196 500,206 C478,196 460,182 460,169
           C460,159 468,149 480,149 C492,149 500,162 500,162Z"
        fill="#1e88e5"/>

  <!-- THUISWERK rainbow text -->
  <text font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="128" font-weight="900">
    <tspan x="145" y="272" fill="#e53935">T</tspan>
    <tspan x="232" y="272" fill="#f57c00">H</tspan>
    <tspan x="325" y="272" fill="#fdd835">U</tspan>
    <tspan x="403" y="272" fill="#43a047">I</tspan>
    <tspan x="438" y="272" fill="#1e88e5">S</tspan>
    <tspan x="524" y="272" fill="#8e24aa">W</tspan>
    <tspan x="637" y="272" fill="#43a047">E</tspan>
    <tspan x="723" y="272" fill="#f57c00">R</tspan>
    <tspan x="810" y="272" fill="#e53935">K</tspan>
  </text>

  <!-- Window left side -->
  <rect x="133" y="400" width="108" height="104" rx="6" fill="#4fc3f7"/>
  <line x1="187" y1="400" x2="187" y2="504" stroke="white" stroke-width="6"/>
  <line x1="133" y1="452" x2="241" y2="452" stroke="white" stroke-width="6"/>
  <rect x="133" y="400" width="108" height="104" rx="6" fill="none"
        stroke="#0288d1" stroke-width="4"/>

  <!-- Pink heart right side -->
  <path d="M823,462 C823,462 840,440 860,440 C880,440 895,457 895,475
           C895,502 860,530 823,550 C786,530 751,502 751,475
           C751,457 766,440 786,440 C806,440 823,462 823,462Z"
        fill="#f48fb1"/>

  <!-- Desk -->
  <rect x="52" y="822" width="896" height="68" rx="12" fill="#c17f3a"/>
  <rect x="52" y="822" width="896" height="20" rx="12" fill="#d4893f"/>

  <!-- Book stack left -->
  <rect x="60" y="758" width="158" height="66" rx="8" fill="#6a1b9a"/>
  <rect x="60" y="758" width="20" height="66" rx="6" fill="#8e24aa"/>
  <rect x="70" y="708" width="148" height="52" rx="8" fill="#e65100"/>
  <rect x="70" y="708" width="20" height="52" rx="6" fill="#f57c00"/>
  <rect x="80" y="662" width="138" height="48" rx="8" fill="#2e7d32"/>
  <rect x="80" y="662" width="20" height="48" rx="6" fill="#388e3c"/>

  <!-- Open notebook -->
  <path d="M288,878 L288,816 Q292,795 445,793 L500,793 L500,878Z"
