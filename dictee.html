  body.tw-sidebar-active .tw-lang-toggle { display: none; }
</style>

<body>
<div id="root"></div>
<script>
  window.THUISWERK_APP = {
    id: 'dictee',
    theme: 'light',
    primaryColor: '#3b9eff',
    bgColor: '#e0f4ff',
    textColor: '#1a3a5c',
  };

  // Per-language data cache
  window._i18n  = {};
  window._words = {};

  // Determine startup language (check ?fav= URL param first)
  window._initLang = (function () {
    try {
      var favId = new URLSearchParams(location.search).get('fav');
      if (favId) {
        var favs = JSON.parse(localStorage.getItem('thuiswerk_favorites') || '[]');
        var fav  = favs.find(function (f) { return f.id === favId && f.app === 'dictee'; });
        if (fav && fav.settings && fav.settings.lang) return fav.settings.lang;
      }
    } catch (e) {}
    return localStorage.getItem('thuiswerk_lang') || 'nl';
  }());

  function loadI18n(lc) {
    return window._i18n[lc]
      ? Promise.resolve(window._i18n[lc])
      : fetch('i18n-' + lc + '.json').then(function (r) { return r.json(); })
          .then(function (d) { window._i18n[lc] = d; return d; });
  }
  function loadWords(lc) {
    return window._words[lc]
      ? Promise.resolve(window._words[lc])
      : fetch('words-' + lc + '.json').then(function (r) { return r.json(); })
          .then(function (d) { window._words[lc] = d; return d; });
  }

  window.APP_READY = Promise.all([
    loadI18n(window._initLang),
    loadWords(window._initLang),
  ]);
</script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Language config ───────────────────────────────────────────────────────────
const LANGUAGES = {
  nl: { label: 'NL', voiceLang: 'nl' },
  en: { label: 'EN', voiceLang: 'en' },
};

// Single-substitution template helper  ({word}, {n}, etc.)
function t(str, val) { return String(str).replace(/\{\w+\}/, val); }

// ── Gewichten ─────────────────────────────────────────────────────────────────
const WEIGHT_MODES = {
  uit:    { weights: [1, 1, 1, 1] },
  licht:  { weights: [1, 2, 3, 3] },
  normaal:{ weights: [1, 3, 6, 6] },
  zwaar:  { weights: [1, 5, 10, 15] },
};

const C = {sky:"#e0f4ff",blue:"#3b9eff",navy:"#1a3a5c",yellow:"#ffd94a",green:"#4ecb71",red:"#ff5c6a",white:"#fff",orange:"#ff8c42"};

// ── Fouthistorie via localStorage ─────────────────────────────────────────────
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("dictee_history") || "{}"); } catch { return {}; }
}
function saveHistory(h) {
  try { localStorage.setItem("dictee_history", JSON.stringify(h)); } catch {}
}
function recordResult(history, word, correct) {
  const h = { ...history };
  if (!h[word]) h[word] = { correct: 0, wrong: 0 };
  if (correct) h[word].correct++;
  else h[word].wrong++;
  return h;
}
function errorCount(history, word) {
  return history[word]?.wrong || 0;
}

// ── Gewogen steekproef ─────────────────────────────────────────────────────────
function weightedSample(pool, n, history, mode) {
  const wts = WEIGHT_MODES[mode]?.weights || [1,1,1,1];
  const weighted = pool.map(w => {
    const errs = Math.min(errorCount(history, w), wts.length - 1);
    return { w, weight: wts[errs] };
  });
  const result = [];
  const used = new Set();
  const total = () => weighted.filter(x => !used.has(x.w)).reduce((s, x) => s + x.weight, 0);
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    let r = Math.random() * total();
    for (const item of weighted) {
      if (used.has(item.w)) continue;
      r -= item.weight;
      if (r <= 0) { result.push(item.w); used.add(item.w); break; }
    }
  }
  return result;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function speak(text, onEnd, voiceName, langCode) {
  try {
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.rate=0.82; utt.pitch=1.05;
    const voices=window.speechSynthesis.getVoices();
    let voice = voiceName ? voices.find(v=>v.name===voiceName)||null : null;
    if(!voice) voice = voices.find(v=>v.lang.startsWith(langCode||"nl"))||null;
    if(voice){ utt.voice=voice; utt.lang=voice.lang; } else { utt.lang=langCode==="en"?"en-US":"nl-NL"; }
    if(onEnd) utt.onend=onEnd;
    window.speechSynthesis.speak(utt);
  } catch(e){if(onEnd)onEnd();}
}
function useVoices() {
  const [voices,setVoices]=useState([]);
  useEffect(()=>{
    function load(){ setVoices(window.speechSynthesis?.getVoices()||[]); }
    load();
    if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=load;
    return ()=>{ if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=null; };
  },[]);
  return voices;
}
function exportJSON(woorden) {
  const blob=new Blob([JSON.stringify(woorden,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="woordenlijst.json"; a.click();
  URL.revokeObjectURL(url);
}

// ── Styles ────────────────────────────────────────────────────────────────────
const S = {
  page: {minHeight:"100vh",background:C.sky,display:"flex",flexDirection:"column",alignItems:"center",padding:"22px 13px 60px",fontFamily:"'Nunito',sans-serif"},
  card: {background:C.white,borderRadius:22,padding:"20px 18px 16px",width:"100%",maxWidth:500,boxShadow:"0 7px 0 #b8d8f5, 0 12px 28px rgba(59,158,255,0.12)",marginBottom:16},
  lbl:  {fontWeight:800,color:C.navy,fontSize:"0.87rem",display:"block",marginBottom:4,marginTop:11},
  sel:  {width:"100%",border:"2.5px solid #b8d8f5",borderRadius:11,padding:"8px 11px",fontFamily:"inherit",fontSize:"0.95rem",fontWeight:700,color:C.navy,background:C.sky,outline:"none"},
  chip: on=>({border:`2.5px solid ${on?C.blue:"#b8d8f5"}`,borderRadius:99,padding:"4px 11px",fontFamily:"inherit",fontSize:"0.82rem",fontWeight:800,color:on?C.white:C.navy,background:on?C.blue:C.sky,cursor:"pointer",whiteSpace:"nowrap"}),
  btn:  (bg,fg="#fff",sm)=>({display:"inline-flex",alignItems:"center",gap:6,border:"none",borderRadius:13,fontFamily:"inherit",fontSize:sm?"0.83rem":"0.97rem",fontWeight:800,cursor:"pointer",padding:sm?"7px 13px":"10px 20px",background:bg,color:fg,boxShadow:"0 4px 0 rgba(0,0,0,0.13)"}),
  tabB: on=>({background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:"0.87rem",fontWeight:800,color:on?C.blue:"#aac8e8",padding:"5px 10px 9px",borderBottom:`3px solid ${on?C.blue:"transparent"}`,marginBottom:-2}),
  prog: p=>({height:"100%",background:`linear-gradient(90deg,${C.blue},#6ec6ff)`,borderRadius:99,width:p+"%",transition:"width 0.4s ease"}),
  inp:  s=>({width:"100%",border:`3px solid ${s==="correct"?C.green:s==="wrong"?C.red:"#b8d8f5"}`,borderRadius:13,padding:"12px 15px",fontFamily:"inherit",fontSize:"1.3rem",fontWeight:800,color:C.navy,background:s==="correct"?"#edfff3":s==="wrong"?"#fff0f1":C.sky,outline:"none",textAlign:"center",letterSpacing:1}),
};

// ── Woordenbank tab ───────────────────────────────────────────────────────────
function WoordenBankTab({ woorden, setWoorden, labels, levelLabels, wbLevel, setWbLevel, history, ui }) {
  const [open, setOpen]     = useState({});
  const [inputs, setInputs] = useState({});
  const data = woorden[wbLevel] || {};

  function removeWord(cat, word) {
    setWoorden(prev => ({...prev, [wbLevel]: {...prev[wbLevel], [cat]: prev[wbLevel][cat].filter(w=>w!==word)}}));
  }
  function addWord(cat) {
    const raw=(inputs[cat]||"").trim().toLowerCase();
    if(!raw) return;
    const nw=raw.split(/[\s,;]+/).filter(Boolean);
    setWoorden(prev => {
      const ex=prev[wbLevel]?.[cat]||[];
      return {...prev,[wbLevel]:{...prev[wbLevel],[cat]:[...new Set([...ex,...nw])]}};
    });
    setInputs(prev=>({...prev,[cat]:""}));
  }

  function errClass(word) {
    const e = errorCount(history, word);
    if (e >= 3) return "wt err3";
    if (e === 2) return "wt err2";
    if (e === 1) return "wt err1";
    return "wt";
  }

  return (<>
    <p style={{fontSize:"0.82rem",fontWeight:700,color:"#7fb8e0",marginBottom:11,lineHeight:1.5}}>
      {ui.wbHint}
    </p>
    <label style={S.lbl}>{ui.wbLevelLabel}</label>
    <select style={S.sel} value={wbLevel} onChange={e=>setWbLevel(e.target.value)}>
      {Object.keys(woorden).filter(k=>!k.startsWith('_')).map(l=><option key={l} value={l}>{levelLabels[l]||l}</option>)}
    </select>
    <div style={{marginTop:12,maxHeight:400,overflowY:"auto"}}>
      {Object.entries(data).map(([cat,lijst])=>(
        <div key={cat} className="wb-sec">
          <div className="wb-hd" onClick={()=>setOpen(p=>({...p,[cat]:!p[cat]}))}>
            <span className="wb-lbl">
              {open[cat]?"▾":"▸"} {labels[cat]||cat}
              <span style={{color:"#aac8e8",fontWeight:600,marginLeft:6}}>({lijst.length})</span>
            </span>
            <span className="wb-tog">{open[cat]?ui.wbCollapse:ui.wbExpand}</span>
          </div>
          {open[cat] && (<>
            <div style={{marginTop:4,lineHeight:2}}>
              {lijst.length===0
                ? <span style={{color:"#bbb",fontSize:"0.8rem",fontStyle:"italic"}}>{ui.wbNoWords}</span>
                : lijst.map(w=>(
                  <span key={w} className={errClass(w)} title={errorCount(history,w)>0?`${errorCount(history,w)}${ui.foutWrongSuffix}`:""}>
                    {w}
                    <button onClick={()=>removeWord(cat,w)} title="✕">✕</button>
                  </span>
                ))
              }
            </div>
            <div className="add-row">
              <input value={inputs[cat]||""} onChange={e=>setInputs(p=>({...p,[cat]:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter")addWord(cat);}}
                placeholder={ui.wbAddPlaceholder} autoCapitalize="none" autoCorrect="off" spellCheck={false}/>
              <button style={S.btn(C.blue,"#fff",true)} onClick={()=>addWord(cat)}>{ui.wbAddBtn}</button>
            </div>
          </>)}
        </div>
      ))}
    </div>
  </>);
}

// ── Fouthistorie tab ──────────────────────────────────────────────────────────
function FoutTab({ history, setHistory, ui }) {
  const entries = Object.entries(history)
    .filter(([,v])=>v.wrong>0)
    .sort((a,b)=>b[1].wrong-a[1].wrong);

  function errColor(n) {
    if(n>=3) return C.red;
    if(n===2) return C.orange;
    return C.yellow;
  }

  return (<>
    <p style={{fontSize:"0.82rem",fontWeight:700,color:"#7fb8e0",marginBottom:11}}>{ui.foutHint}</p>
    {entries.length===0
      ? <p style={{color:"#aaa",fontWeight:700,fontSize:"0.87rem",padding:"14px 0",textAlign:"center"}}>{ui.foutNone}</p>
      : (<>
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {entries.map(([word,{correct,wrong}])=>(
              <div key={word} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"2px dashed #e0f0ff",fontSize:"0.88rem",fontWeight:700}}>
                <span style={{flex:1,color:C.navy}}>{word}</span>
                <span style={{background:errColor(wrong),borderRadius:99,padding:"2px 9px",fontSize:"0.78rem",fontWeight:800,color:wrong>=2?C.white:C.navy}}>
                  {wrong}{ui.foutWrongSuffix}
                </span>
                <span style={{color:"#4ecb71",fontSize:"0.78rem",fontWeight:700}}>{correct}{ui.foutRightSuffix}</span>
                <button onClick={()=>setHistory(h=>{const n={...h};delete n[word];saveHistory(n);return n;})}
                  style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:"0.9rem",padding:"2px 4px"}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{marginTop:12}}>
            <button style={S.btn("#fff0f1",C.red,true)}
              onClick={()=>{if(confirm(ui.foutClearConfirm)){{setHistory({});saveHistory({})}}}}>
              {ui.foutClearBtn}
            </button>
          </div>
        </>)
    }
  </>);
}

// ── Initialiseer vanuit favoriet (URL ?fav=id) ────────────────────────────────
function loadInitFav() {
  try {
    const params = new URLSearchParams(window.location.search);
    const favId = params.get('fav');
    if (!favId) return null;
    const favs = JSON.parse(localStorage.getItem('thuiswerk_favorites') || '[]');
    const fav = favs.find(f => f.id === favId && f.app === 'dictee');
    return fav ? fav.settings : null;
  } catch(e) { return null; }
}

// ── Hoofdapp ──────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang]             = useState(window._initLang);
  const [ui,   setUi]               = useState(window._i18n[window._initLang]?.dictee || null);
  const [woorden, setWoorden]       = useState(window._words[window._initLang] || null);
  const [geladen, setGeladen]       = useState(false);
  const [history, setHistoryState]  = useState(loadHistory);
  const [screen, setScreen]         = useState("setup");
  const [tab, setTab]               = useState("oefenen");
  const [level, setLevel]           = useState(window._initLang === 'nl' ? 'groep5' : 'year3');
  const [wbLevel, setWbLevel]       = useState(window._initLang === 'nl' ? 'groep5' : 'year3');
  const [selCats, setSelCats]       = useState([]);
  const [wordCount, setWordCount]   = useState(10);
  const [weightMode, setWeightMode] = useState("normaal");
  const [selectedVoice, setSelectedVoice] = useState("");
  const [customText, setCustomText] = useState("");
  const [error, setError]           = useState("");
  const [words, setWords]           = useState([]);
  const [idx, setIdx]               = useState(0);
  const [answer, setAnswer]         = useState("");
  const [ansState, setAnsState]     = useState("idle");
  const [fbMsg, setFbMsg]           = useState("");
  const [showNext, setShowNext]     = useState(false);
  const [speaking, setSpeaking]     = useState(false);
  const [results, setResults]       = useState([]);

  const inputRef = useRef(null);
  const fileRef  = useRef(null);
  const voices   = useVoices();

  // Luister naar globale taalwissel vanuit de sidebar
  useEffect(() => {
    const handler = (e) => { if (e.detail !== lang) switchLang(e.detail); };
    window.addEventListener('thuiswerk:setLang', handler);
    return () => window.removeEventListener('thuiswerk:setLang', handler);
  }, [lang]);

  // Registreer instellingen-API voor de sidebar (na elke render zodat closures vers zijn)
  useEffect(() => {
    window.THUISWERK_APP.getSettings = () => ({
      lang, level, selCats, wordCount, weightMode, selectedVoice, customText
    });
    window.THUISWERK_APP.applySettings = (s) => {
      if (s.wordCount  !== undefined) setWordCount(s.wordCount);
      if (s.weightMode !== undefined) setWeightMode(s.weightMode);
      if (s.selectedVoice !== undefined) setSelectedVoice(s.selectedVoice);
      if (s.customText !== undefined) setCustomText(s.customText);
      if (s.lang && s.lang !== lang) {
        switchLang(s.lang);
      } else {
        if (s.level !== undefined) { setLevel(s.level); setWbLevel(s.level); }
        if (s.selCats !== undefined) setSelCats(s.selCats);
        setScreen('setup'); setTab('oefenen');
      }
    };
  });

  // Laad favoriet vanuit URL (?fav=id) bij eerste render
  useEffect(() => {
    const s = loadInitFav();
    if (!s) return;
    if (s.wordCount  !== undefined) setWordCount(s.wordCount);
    if (s.weightMode !== undefined) setWeightMode(s.weightMode);
    if (s.selectedVoice !== undefined) setSelectedVoice(s.selectedVoice);
    if (s.customText !== undefined) setCustomText(s.customText);
    if (s.lang && s.lang !== lang) {
      switchLang(s.lang);
    } else {
      if (s.level !== undefined) { setLevel(s.level); setWbLevel(s.level); }
      if (s.selCats !== undefined) setSelCats(s.selCats);
    }
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  const labels      = woorden?._labels || {};
  const levelLabels = woorden?._level_labels || {};
  const availLevels = woorden ? Object.keys(woorden).filter(k => !k.startsWith('_')) : [];
  const availCats   = woorden ? Object.keys(woorden[level] || {}).filter(k => k !== "all") : [];

  function catLabel(id) { return labels[id] || id; }

  function setHistory(fn) {
    setHistoryState(prev => { const next = typeof fn==="function"?fn(prev):fn; saveHistory(next); return next; });
  }

  async function switchLang(lc) {
    const [i18n, words] = await Promise.all([loadI18n(lc), loadWords(lc)]);
    const firstLevel = Object.keys(words).filter(k => !k.startsWith('_'))[0];
    localStorage.setItem('thuiswerk_lang', lc);
    setLang(lc);
    setUi(i18n.dictee);
    setWoorden(words);
    setGeladen(false);
    setLevel(firstLevel);
    setWbLevel(firstLevel);
    setSelCats([]);
    setError("");
    setSelectedVoice("");
    setScreen("setup");
    setTab("oefenen");
  }

  function toggleCat(id) {
    setSelCats(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }

  function handleFileLoad(e) {
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const parsed=JSON.parse(ev.target.result);
        const levelKeys=Object.keys(parsed).filter(k=>!k.startsWith('_'));
        if(levelKeys.length===0) throw new Error(ui.fileErrorFormat);
        setWoorden(parsed); setSelCats([]); setGeladen(true); setError("");
        setLevel(levelKeys[0]); setWbLevel(levelKeys[0]);
      } catch(err){setError(ui.fileErrorPrefix+err.message);}
    };
    reader.readAsText(file); e.target.value="";
  }

  function getPool(lv, cats) {
    const data=woorden[lv]||{};
    if(cats.length===0) return data["all"]||[];
    const seen=new Set(), pool=[];
    for(const cat of cats) for(const w of (data[cat]||[])) if(!seen.has(w)){seen.add(w);pool.push(w);}
    return pool;
  }

  function startDictee() {
    setError("");
    let wl;
    if(customText.trim()){
      wl=customText.trim().split("\n").map(w=>w.trim().toLowerCase()).filter(Boolean).slice(0,wordCount);
    } else {
      const pool=getPool(level,selCats);
      if(pool.length===0){setError(ui.errorNoWords);return;}
      wl=weightedSample(pool,wordCount,history,weightMode);
    }
    setWords(wl);setIdx(0);setResults([]);
    setAnswer("");setAnsState("idle");setFbMsg("");setShowNext(false);
    setScreen("dictee");
    setTimeout(()=>{setSpeaking(true);speak(wl[0],()=>setSpeaking(false),selectedVoice,lang);},350);
  }

  function checkAnswer() {
    if(!answer.trim()){speak(words[idx],null,selectedVoice,lang);return;}
    const correct=words[idx];
    const ok=answer.trim().toLowerCase()===correct;
    setResults(prev=>[...prev,{word:correct,answer:answer.trim().toLowerCase(),correct:ok}]);
    setHistory(h=>recordResult(h,correct,ok));
    setAnsState(ok?"correct":"wrong");
    setFbMsg(ok?ui.praise[Math.floor(Math.random()*ui.praise.length)]:t(ui.wrongMsg, correct));
    setShowNext(true);
    if(ok) speak(ui.wellDone,null,selectedVoice,lang);
    else setTimeout(()=>speak(correct,null,selectedVoice,lang),300);
  }

  function nextWord() {
    const next=idx+1;
    if(next>=words.length){setScreen("results");return;}
    setIdx(next);setAnswer("");setAnsState("idle");setFbMsg("");setShowNext(false);
    setTimeout(()=>{setSpeaking(true);speak(words[next],()=>setSpeaking(false),selectedVoice,lang);},300);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  function retryWrong() {
    const wrong=results.filter(r=>!r.correct).map(r=>r.word);
    setWords(wrong);setIdx(0);setResults([]);
    setAnswer("");setAnsState("idle");setFbMsg("");setShowNext(false);
    setScreen("dictee");
    setTimeout(()=>{setSpeaking(true);speak(wrong[0],()=>setSpeaking(false),selectedVoice,lang);},350);
  }

  function stopDictee() { window.speechSynthesis?.cancel(); setScreen("setup"); }

  const pct=words.length?idx/words.length*100:0;
  const finalOk=results.filter(r=>r.correct).length;
  const finalPct=results.length?Math.round(finalOk/results.length*100):0;

  const TABS = ["oefenen","woordenbank","fouten"];

  return (
    <div style={S.page}>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"2.5rem",color:C.navy,textShadow:`3px 3px 0 ${C.yellow}`,marginBottom:3,textAlign:"center"}}>{ui.appTitle}</div>
      <div style={{fontSize:"0.92rem",color:C.blue,fontWeight:800,marginBottom:8,textAlign:"center"}}>{ui.appSubtitle}</div>
      <div className="tw-lang-toggle" style={{display:"flex",gap:5,marginBottom:14}}>
        {Object.keys(LANGUAGES).map(lc=>(
          <button key={lc} style={S.chip(lang===lc)} onClick={()=>switchLang(lc)}>{LANGUAGES[lc].label}</button>
        ))}
      </div>

      {/* ── SETUP ── */}
      {screen==="setup" && <>
        <div style={S.card}>
          <div style={{display:"flex",gap:4,marginBottom:13,borderBottom:"2.5px solid #e0f0ff"}}>
            {TABS.map(t=>(
              <button key={t} style={S.tabB(tab===t)} onClick={()=>setTab(t)}>{ui.tabs[t]}</button>
            ))}
          </div>

          {tab==="oefenen" && <>
            {error && <div style={{background:"#fff0f1",border:"2px solid #ff5c6a",borderRadius:10,padding:"9px 12px",marginBottom:11,fontSize:"0.83rem",fontWeight:700,color:C.red}}>⚠️ {error}</div>}

            <label style={S.lbl}>{ui.levelLabel}</label>
            <select style={S.sel} value={level} onChange={e=>{setLevel(e.target.value);setSelCats([]);}}>
              {availLevels.map(l=><option key={l} value={l}>{levelLabels[l]||l}</option>)}
            </select>

            <label style={S.lbl}>{ui.catsLabel} <span style={{fontWeight:600,color:"#aac8e8",fontSize:"0.79rem"}}>{ui.catsHint}</span></label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
              {availCats.map(cat=>(
                <button key={cat} style={S.chip(selCats.includes(cat))} onClick={()=>toggleCat(cat)}>
                  {catLabel(cat)}
                </button>
              ))}
              {selCats.length>0 && <button style={{...S.chip(false),color:"#bbb",fontSize:"0.76rem"}} onClick={()=>setSelCats([])}>{ui.clearBtn}</button>}
            </div>

            <label style={S.lbl}>{ui.wordCountLabel}</label>
            <select style={S.sel} value={wordCount} onChange={e=>setWordCount(+e.target.value)}>
              {[5,10,15,20].map(n=><option key={n} value={n}>{t(ui.wordsCount, n)}</option>)}
            </select>

            <label style={S.lbl}>{ui.weightLabel}</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
              {Object.keys(WEIGHT_MODES).map(k=>(
                <button key={k} style={S.chip(weightMode===k)} onClick={()=>setWeightMode(k)}>
                  {ui.weightModes[k]}
                </button>
              ))}
            </div>
            {weightMode!=="uit" && (
              <div style={{fontSize:"0.78rem",fontWeight:700,color:"#7fb8e0",marginTop:5}}>{ui.weightHint}</div>
            )}

            <label style={S.lbl}>{ui.voiceLabel}</label>
            <select style={S.sel} value={selectedVoice} onChange={e=>setSelectedVoice(e.target.value)}>
              <option value="">{ui.voiceAuto}</option>
              {voices.length===0 && <option disabled>{ui.voicesLoading}</option>}
              {voices.map(v=>(
                <option key={v.name} value={v.name}>
                  {v.name} ({v.lang}){v.localService?" 📴":""}
                </option>
              ))}
            </select>
            {selectedVoice && (
              <button style={{marginTop:6,fontSize:"0.78rem",fontWeight:700,color:C.blue,background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}
                onClick={()=>speak(ui.testSentence,null,selectedVoice,lang)}>
                {ui.testVoiceBtn}
              </button>
            )}

            <div style={{borderTop:"2px dashed #e0f0ff",margin:"13px 0"}}/>
            <label style={{...S.lbl,marginTop:0}}>{ui.customLabel}</label>
            <textarea style={{...S.sel,height:76,resize:"vertical",fontSize:"0.86rem"}}
              value={customText} onChange={e=>setCustomText(e.target.value)}
              placeholder={ui.customPlaceholder}/>

            <div style={{display:"flex",gap:9,marginTop:14}}>
              <button style={S.btn(C.blue)} onClick={startDictee}>{ui.startBtn}</button>
            </div>
          </>}

          {tab==="woordenbank" && (
            <WoordenBankTab woorden={woorden} setWoorden={setWoorden} labels={labels} levelLabels={levelLabels}
              wbLevel={wbLevel} setWbLevel={setWbLevel} history={history} ui={ui}/>
          )}

          {tab==="fouten" && (
            <FoutTab history={history} setHistory={setHistory} ui={ui}/>
          )}
        </div>

        {/* ── Bestandsbeheer ── */}
        <div style={{...S.card,padding:"16px 18px"}}>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"1rem",color:C.navy,marginBottom:8}}>{ui.fileTitle}</div>
          {geladen && <div style={{fontSize:"0.8rem",fontWeight:700,background:"#edfff3",color:"#2a8a4a",padding:"5px 9px",borderRadius:8,marginBottom:10,display:"inline-flex",gap:4}}>{ui.fileActive}</div>}
          <p style={{fontSize:"0.82rem",fontWeight:700,color:"#7fb8e0",marginBottom:11,lineHeight:1.5}}>
            {ui.fileHint} <code style={{background:"#f0f0f0",padding:"1px 4px",borderRadius:4}}>{ui.fileCode}</code>.
          </p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button style={S.btn("#e8f4ff",C.blue,true)} onClick={()=>fileRef.current?.click()}>{ui.fileImportBtn}</button>
            <button style={S.btn("#edfff3","#2a8a4a",true)} onClick={()=>exportJSON(woorden)}>{ui.fileExportBtn}</button>
            {geladen && <button style={S.btn("#fff0f1",C.red,true)} onClick={()=>{setWoorden(window._words[lang]);setGeladen(false);setSelCats([]);}}>{ui.fileResetBtn}</button>}
          </div>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleFileLoad}/>
        </div>
      </>}

      {/* ── DICTEE ── */}
      {screen==="dictee" && words.length>0 && (
        <div style={S.card}>
          <div style={{background:C.sky,borderRadius:99,height:13,width:"100%",overflow:"hidden",marginBottom:15,border:"2px solid #b8d8f5"}}>
            <div style={S.prog(pct)}/>
          </div>
          <div style={{fontSize:"0.83rem",fontWeight:800,color:C.blue,marginBottom:9,textAlign:"center"}}>
            {ui.dicteeWord} {idx+1} {ui.dicteeOf} {words.length}
          </div>
          <button onClick={()=>{setSpeaking(true);speak(words[idx],()=>setSpeaking(false),selectedVoice,lang);}}
            style={{display:"block",margin:"0 auto 13px",width:82,height:82,borderRadius:"50%",border:"none",background:C.yellow,boxShadow:"0 6px 0 #e6ba00",cursor:"pointer",fontSize:"2.2rem",animation:speaking?"none":"pulse 2.5s ease-in-out infinite",transform:speaking?"scale(1.07)":"none"}}>
            🔊
          </button>
          <p style={{textAlign:"center",fontSize:"0.79rem",color:"#7fb8e0",fontWeight:700,marginBottom:13}}>{ui.dicteeHint}</p>
          <input ref={inputRef} style={S.inp(ansState)} value={answer}
            onChange={e=>setAnswer(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter") showNext?nextWord():checkAnswer();}}
            placeholder={ui.dicteeInputPlaceholder}
            autoComplete="off" autoCorrect="off" autoCapitalize="none" spellCheck={false}
            disabled={showNext}/>
          <div style={{textAlign:"center",marginTop:10,fontSize:"0.97rem",fontWeight:800,minHeight:22,color:ansState==="correct"?C.green:ansState==="wrong"?C.red:"transparent"}}>
            {fbMsg||" "}
          </div>
          <div style={{display:"flex",gap:9,justifyContent:"center",marginTop:11}}>
            {!showNext && <button style={S.btn(C.green)} onClick={checkAnswer}>{ui.dicteeCheckBtn}</button>}
            {showNext  && <button style={S.btn(C.navy)}  onClick={nextWord}>{ui.dicteeNextBtn}</button>}
          </div>
          <div style={{textAlign:"center",marginTop:12}}>
            <button style={{background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:"0.8rem",fontWeight:700,color:"#aac8e8",textDecoration:"underline"}}
              onClick={stopDictee}>{ui.dicteeStopBtn}</button>
          </div>
        </div>
      )}

      {/* ── RESULTS ── */}
      {screen==="results" && (
        <div style={S.card}>
          <div style={{fontSize:"2.5rem",textAlign:"center",marginBottom:5}}>{finalPct>=90?"🏆":finalPct>=70?"🎉":finalPct>=50?"💪":"📚"}</div>
          <div style={{textAlign:"center",fontSize:"1.8rem",letterSpacing:4,marginBottom:5}}>{finalPct>=90?"⭐⭐⭐":finalPct>=70?"⭐⭐":finalPct>=50?"⭐":""}</div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"3.4rem",color:C.navy,textAlign:"center",lineHeight:1,marginBottom:4}}>{finalOk} / {results.length}</div>
          <div style={{textAlign:"center",fontWeight:800,color:C.blue,marginBottom:15,fontSize:"0.9rem"}}>{finalPct}{ui.resultsPct}</div>
          <div style={{maxHeight:270,overflowY:"auto"}}>
            {results.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i===results.length-1?"none":"2px dashed #e0f0ff",fontSize:"0.9rem",fontWeight:700}}>
                <span>{r.correct?"✅":"❌"}</span>
                <span style={{flex:1,color:C.navy}}>{r.word}</span>
                {!r.correct && <span style={{color:C.red,fontSize:"0.82rem"}}>{ui.resultsYou} "{r.answer}"</span>}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:9,justifyContent:"center",marginTop:15}}>
            <button style={S.btn(C.yellow,C.navy)} onClick={()=>setScreen("setup")}>{ui.resultsRetryBtn}</button>
            {results.some(r=>!r.correct) && <button style={S.btn(C.blue)} onClick={retryWrong}>{ui.resultsWrongBtn}</button>}
          </div>
        </div>
      )}

      <div style={{textAlign:"center",marginTop:4,fontSize:"0.72rem",color:"#aac8e8",fontWeight:600,lineHeight:2}}>
        <a href="https://github.com/mmalkus/Thuiswerk" target="_blank" rel="noopener" style={{color:"#3b9eff",textDecoration:"none"}}>GitHub</a>
        {" · "}MIT License © 2026 Maurits Malkus
      </div>
    </div>
  );
}

window.APP_READY.then(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
});
</script>
<script src="sidebar.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
